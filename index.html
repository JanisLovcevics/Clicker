<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clicker</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="layout" id="layout">
        <div id="victory-div">Press "Play" to start</div>
        <div id="score-div"></div>
        <div class="btns-bg btns-bg-passive">
            <table id="table">
                <rt>
                    <rb><button class="click-btn" id="red"></button></rb>
                    <rb><button class="click-btn" id="green"></button></rb>
                </rt>
                <rt>
                    <rb><button class="click-btn" id="blue"></button></rb>
                    <rb><button class="click-btn" id="yellow"></button></rb>
                </rt>
            </table>
        </div>
        <button id="start-btn">Play</button>
    </div>
</body>
<script src="script.js"></script>
</html>
