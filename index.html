<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clicker</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="layout" id="layout">
        <div class="game-area">
            <div id="victory-div">Press "Play" to start</div>
            <div id="score-div"></div>
            <div class="btns-bg btns-bg-passive">
                <div class="grid-container">
                    <button class="click-btn" id="red"></button>
                    <button class="click-btn" id="green"></button>
                    <button class="click-btn" id="blue"></button>
                    <button class="click-btn" id="yellow"></button>
                </div>
            </div>
            <button id="start-btn">Play</button>
        </div>
        <div class="improvements">
            <button>Catch Number</button>
            <button>Pacman</button>
            <button>Shooter</button>
        </div>
    </div>
</body>
<script src="script.js"></script>
</html>
